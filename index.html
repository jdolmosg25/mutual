<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutual Media Group</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica', Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 80%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .content { max-width: 500px; }
        h1 { font-size: 3rem; font-weight: normal; margin-bottom: 10px; }
        h1 span { font-weight: bold; }
        p { color: #888; font-size: 0.9rem; line-height: 1.5; }
        a { color: #fff; text-decoration: none; border-bottom: 1px solid #fff; padding-bottom: 2px; }
        .logo-graphic {
            display: flex;
            gap: 20px;
        }
        .bar { width: 40px; height: 250px; background: #fff; position: relative; }
        .bar.gray::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 60px; background: #888;
        }
        .bar.bottom::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 60px; background: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>Hacemos <span>visible</span> lo que transforma.</h1>
            <p>Productora audiovisual especializada en proyectos de impacto social.<br>Bogotá, Colombia.</p>
            <br>
            <a href="mailto:hola@mutualmediagroup.com">hola@mutualmediagroup.com →</a>
        </div>
        <div class="logo-graphic">
            <div class="bar gray"></div>
            <div class="bar bottom"></div>
            <div class="bar gray"></div>
        </div>
    </div>
</body>
</html>
